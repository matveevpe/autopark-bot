<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Выходные водителей</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #fff);
    color: var(--tg-theme-text-color, #000);
    padding: 12px 16px 32px;
    min-height: 100vh;
    font-size: 15px;
  }
  .header { display: flex; align-items: center; gap: 10px; padding: 4px 0 16px; }
  .header-icon { font-size: 28px; }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--tg-theme-hint-color, #999); margin-top: 1px; }
  .card { background: var(--tg-theme-secondary-bg-color, #f1f1f1); border-radius: 14px; padding: 0; margin-bottom: 10px; overflow: hidden; }
  .field { padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); }
  .card .field:last-child { border-bottom: none; }
  .field-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
  .field-body { flex: 1; min-width: 0; }
  .field-label { font-size: 11px; color: var(--tg-theme-hint-color, #999); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
  select { width: 100%; background: transparent; border: none; font-size: 15px; color: var(--tg-theme-text-color, #000); appearance: none; cursor: pointer; outline: none; padding: 0; font-family: inherit; }
  .type-tabs { display: flex; }
  .type-tab { flex: 1; padding: 10px 6px; text-align: center; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--tg-theme-hint-color, #999); transition: all 0.15s; position: relative; font-family: inherit; line-height: 1.3; }
  .type-tab::after { content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 2px; background: var(--tg-theme-button-color, #2481cc); transform: scaleX(0); transition: transform 0.15s; border-radius: 2px 2px 0 0; }
  .type-tab.active { color: var(--tg-theme-button-color, #2481cc); }
  .type-tab.active::after { transform: scaleX(1); }
  .days-section { padding: 12px 14px; }
  .days-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .days-title { font-size: 11px; color: var(--tg-theme-hint-color, #999); text-transform: uppercase; letter-spacing: 0.4px; }
  .days-count { font-size: 12px; color: var(--tg-theme-button-color, #2481cc); font-weight: 600; }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .dow-label { text-align: center; font-size: 11px; font-weight: 600; color: var(--tg-theme-hint-color, #999); padding: 2px 0 4px; }
  .dow-label.weekend { color: #ff3b30; }
  .day-btn { aspect-ratio: 1; border-radius: 9px; border: none; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.1s; font-family: inherit; display: flex; align-items: center; justify-content: center; }
  .day-btn.weekend { color: #ff3b30; }
  .day-btn.selected { background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff) !important; transform: scale(1.05); }
  .day-btn:active { transform: scale(0.94); }
  .select-all-btn { display: block; width: 100%; margin-top: 8px; padding: 8px; background: transparent; border: 1.5px solid var(--tg-theme-button-color, #2481cc); border-radius: 9px; color: var(--tg-theme-button-color, #2481cc); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .submit-btn { width: 100%; padding: 15px; background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 14px; font-family: inherit; transition: opacity 0.15s, transform 0.1s; }
  .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.45; pointer-events: none; }
  #successScreen { display: none; text-align: center; padding: 50px 20px 32px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
  .success-circle { width: 80px; height: 80px; background: #34c759; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
  .success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .success-info { font-size: 14px; color: var(--tg-theme-hint-color, #999); line-height: 1.7; margin-bottom: 32px; }
  .success-info strong { color: var(--tg-theme-text-color, #000); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
  /* Доступ */
  #accessDenied { display: none; text-align: center; padding: 80px 20px 32px; }
  #loadingScreen { text-align: center; padding: 80px 20px; }
  .spinner { font-size: 32px; animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Загрузка -->
<div id="loadingScreen">
  <div class="spinner">⏳</div>
  <div style="margin-top:16px; color:var(--tg-theme-hint-color,#999)">Проверяем доступ...</div>
</div>

<!-- Нет доступа -->
<div id="accessDenied">
  <div style="font-size:56px; margin-bottom:20px;">🔒</div>
  <div style="font-size:20px; font-weight:700; margin-bottom:12px;">Нет доступа</div>
  <div style="color:var(--tg-theme-hint-color,#999); font-size:14px; line-height:1.6;">
    Приложение доступно только<br>для менеджеров и администраторов.
  </div>
</div>

<!-- Основной экран -->
<div id="app" style="display:none;">
  <div class="header">
    <div class="header-icon">🚗</div>
    <div>
      <div class="header-title">Выходные водителей</div>
      <div class="header-sub">Запись в Notion автоматически</div>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <div class="field-icon">👤</div>
      <div class="field-body">
        <div class="field-label">Водитель</div>
        <select id="employee">
          <option>Загрузка списка…</option>
        </select>
      </div>
    </div>
    <div class="field">
      <div class="field-icon">📅</div>
      <div class="field-body">
        <div class="field-label">Месяц</div>
        <select id="month" onchange="buildDaysGrid()">
          <option>Январь</option><option>Февраль</option><option>Март</option>
          <option>Апрель</option><option>Май</option><option>Июнь</option>
          <option>Июль</option><option>Август</option><option>Сентябрь</option>
          <option>Октябрь</option><option>Ноябрь</option><option>Декабрь</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="type-tabs">
      <button class="type-tab active" data-value="Выходной" onclick="selectType(this)">😴<br>Выходной</button>
      <button class="type-tab" data-value="Больничный" onclick="selectType(this)">🤒<br>Больничный</button>
      <button class="type-tab" data-value="ТС в Ремонте" onclick="selectType(this)">🔧<br>ТС в ремонте</button>
    </div>
  </div>

  <div class="card">
    <div class="days-section">
      <div class="days-header">
        <span class="days-title">Дни месяца</span>
        <span class="days-count" id="daysCount"></span>
      </div>
      <div class="days-grid" id="daysGrid"></div>
      <button class="select-all-btn" id="selectAllBtn" onclick="toggleSelectAll()">Выбрать все дни</button>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submit()">✅ Добавить в Notion</button>
</div>

<!-- Успех -->
<div id="successScreen">
  <div class="success-circle">✓</div>
  <div class="success-title">Добавлено!</div>
  <div class="success-info" id="successInfo"></div>
  <button class="submit-btn" onclick="reset()" style="max-width:280px; margin:0 auto; display:block;">＋ Добавить ещё</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.ready(); }

  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                  'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

  let selectedType = 'Выходной';
  let selectedDays = new Set();
  const tgUserId = tg?.initDataUnsafe?.user?.id || '';

  // Установить текущий месяц
  document.getElementById('month').value = MONTHS[new Date().getMonth()];

  // Проверка доступа + загрузка списка водителей
  async function init() {
    try {
      const r = await fetch('/api/employees?tgId=' + tgUserId);
      if (r.status === 403) {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('accessDenied').style.display = 'block';
        return;
      }
      const { employees } = await r.json();
      const sel = document.getElementById('employee');
      sel.innerHTML = employees?.length
        ? employees.map(e => `<option value="${e}">${e}</option>`).join('')
        : '<option>Список пуст</option>';

      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      buildDaysGrid();
    } catch (e) {
      document.getElementById('loadingScreen').innerHTML =
        '<div style="color:#ff3b30; padding:20px;">❌ Ошибка соединения</div>';
    }
  }

  function buildDaysGrid() {
    const monthIdx = MONTHS.indexOf(document.getElementById('month').value);
    const year = new Date().getFullYear();
    const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();
    const firstDow = (new Date(year, monthIdx, 1).getDay() + 6) % 7;

    selectedDays.clear();
    updateDaysCount();

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach((n, i) => {
      const d = document.createElement('div');
      d.className = 'dow-label' + (i >= 5 ? ' weekend' : '');
      d.textContent = n;
      grid.appendChild(d);
    });

    for (let i = 0; i < firstDow; i++) {
      const s = document.createElement('div');
      grid.appendChild(s);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dow = (firstDow + d - 1) % 7;
      const btn = document.createElement('button');
      btn.className = 'day-btn' + (dow >= 5 ? ' weekend' : '');
      btn.textContent = d;
      btn.dataset.day = d;
      btn.addEventListener('click', () => {
        if (selectedDays.has(d)) { selectedDays.delete(d); btn.classList.remove('selected'); }
        else { selectedDays.add(d); btn.classList.add('selected'); }
        updateDaysCount();
        tg?.HapticFeedback?.selectionChanged();
      });
      grid.appendChild(btn);
    }
    document.getElementById('selectAllBtn').textContent = 'Выбрать все дни';
  }

  function toggleSelectAll() {
    const btns = document.querySelectorAll('.day-btn');
    const allSel = selectedDays.size === btns.length;
    selectedDays.clear();
    btns.forEach(btn => {
      if (!allSel) { selectedDays.add(+btn.dataset.day); btn.classList.add('selected'); }
      else btn.classList.remove('selected');
    });
    document.getElementById('selectAllBtn').textContent = allSel ? 'Выбрать все дни' : 'Снять выделение';
    updateDaysCount();
  }

  function updateDaysCount() {
    document.getElementById('daysCount').textContent = selectedDays.size > 0 ? `выбрано ${selectedDays.size} дн.` : '';
  }

  function selectType(btn) {
    document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.value;
    tg?.HapticFeedback?.selectionChanged();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  async function submit() {
    const employee = document.getElementById('employee').value;
    const month = document.getElementById('month').value;
    if (!employee || employee.includes('Загрузка') || employee.includes('Список')) {
      return showToast('⚠️ Выберите водителя');
    }
    if (selectedDays.size === 0) return showToast('⚠️ Выберите хотя бы один день');

    const days = Array.from(selectedDays).sort((a,b)=>a-b).join(', ');
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Сохраняем…';

    try {
      const res = await fetch('/api/vacation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ employee, month, type: selectedType, days, tgId: tgUserId }),
      });
      const data = await res.json();
      if (data.success) {
        tg?.HapticFeedback?.notificationOccurred('success');
        document.getElementById('app').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
        document.getElementById('successInfo').innerHTML =
          `<strong>${employee}</strong><br>${month} · ${selectedType}<br>Дни: ${days}`;
      } else {
        showToast('❌ ' + (data.error || 'Ошибка Notion'));
        btn.disabled = false;
        btn.textContent = '✅ Добавить в Notion';
      }
    } catch {
      showToast('❌ Нет соединения');
      btn.disabled = false;
      btn.textContent = '✅ Добавить в Notion';
    }
  }

  function reset() {
    document.getElementById('successScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = '✅ Добавить в Notion';
    buildDaysGrid();
  }

  init();
</script>
</body>
</html>
