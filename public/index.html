<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Отпуска водителей</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #fff);
    color: var(--tg-theme-text-color, #000);
    padding: 12px 16px 32px;
    min-height: 100vh;
    font-size: 15px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0 16px;
  }
  .header-icon { font-size: 28px; }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--tg-theme-hint-color, #999); margin-top: 1px; }

  .card {
    background: var(--tg-theme-secondary-bg-color, #f1f1f1);
    border-radius: 14px;
    padding: 0;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .field {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .card .field:last-child { border-bottom: none; }

  .field-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
  .field-body { flex: 1; min-width: 0; }
  .field-label {
    font-size: 11px;
    color: var(--tg-theme-hint-color, #999);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 3px;
  }

  select {
    width: 100%;
    background: transparent;
    border: none;
    font-size: 15px;
    color: var(--tg-theme-text-color, #000);
    appearance: none;
    cursor: pointer;
    outline: none;
    padding: 0;
    font-family: inherit;
  }

  /* Type selector */
  .type-tabs {
    display: flex;
    gap: 0;
  }
  .type-tab {
    flex: 1;
    padding: 10px 6px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 0;
    border: none;
    background: transparent;
    color: var(--tg-theme-hint-color, #999);
    transition: all 0.15s;
    position: relative;
    font-family: inherit;
    line-height: 1.3;
  }
  .type-tab::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 2px;
    background: var(--tg-theme-button-color, #2481cc);
    transform: scaleX(0);
    transition: transform 0.15s;
    border-radius: 2px 2px 0 0;
  }
  .type-tab.active {
    color: var(--tg-theme-button-color, #2481cc);
  }
  .type-tab.active::after { transform: scaleX(1); }

  /* Days grid */
  .days-section {
    padding: 12px 14px;
  }
  .days-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .days-title {
    font-size: 11px;
    color: var(--tg-theme-hint-color, #999);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .days-count {
    font-size: 12px;
    color: var(--tg-theme-button-color, #2481cc);
    font-weight: 600;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }
  .day-btn {
    aspect-ratio: 1;
    border-radius: 9px;
    border: none;
    background: var(--tg-theme-bg-color, #fff);
    color: var(--tg-theme-text-color, #000);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.1s;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .day-btn.selected {
    background: var(--tg-theme-button-color, #2481cc);
    color: var(--tg-theme-button-text-color, #fff);
    transform: scale(1.05);
  }
  .day-btn:active { transform: scale(0.94); }

  .select-all-btn {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 8px;
    background: transparent;
    border: 1.5px solid var(--tg-theme-button-color, #2481cc);
    border-radius: 9px;
    color: var(--tg-theme-button-color, #2481cc);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .select-all-btn:active { opacity: 0.7; }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--tg-theme-button-color, #2481cc);
    color: var(--tg-theme-button-text-color, #fff);
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 14px;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
  }
  .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.45; pointer-events: none; }

  /* Loading skeleton */
  .skeleton { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

  /* Success screen */
  #successScreen {
    display: none;
    text-align: center;
    padding: 50px 20px 32px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }

  .success-circle {
    width: 80px; height: 80px;
    background: #34c759;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .success-info {
    font-size: 14px;
    color: var(--tg-theme-hint-color, #999);
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .success-info strong { color: var(--tg-theme-text-color, #000); }

  /* Error toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #ff3b30; color: #fff;
    padding: 10px 18px; border-radius: 20px;
    font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Основной экран -->
<div id="app">
  <div class="header">
    <div class="header-icon">🚗</div>
    <div>
      <div class="header-title">Выходные водителей</div>
      <div class="header-sub">Запись в Notion автоматически</div>
    </div>
  </div>

  <!-- Водитель + Месяц -->
  <div class="card">
    <div class="field">
      <div class="field-icon">👤</div>
      <div class="field-body">
        <div class="field-label">Водитель</div>
        <select id="employee">
          <option class="skeleton">Загрузка списка…</option>
        </select>
      </div>
    </div>
    <div class="field">
      <div class="field-icon">📅</div>
      <div class="field-body">
        <div class="field-label">Месяц</div>
        <select id="month" onchange="onMonthChange()">
          <option value="Январь">Январь</option>
          <option value="Февраль">Февраль</option>
          <option value="Март">Март</option>
          <option value="Апрель">Апрель</option>
          <option value="Май">Май</option>
          <option value="Июнь">Июнь</option>
          <option value="Июль">Июль</option>
          <option value="Август">Август</option>
          <option value="Сентябрь">Сентябрь</option>
          <option value="Октябрь">Октябрь</option>
          <option value="Ноябрь">Ноябрь</option>
          <option value="Декабрь">Декабрь</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Тип -->
  <div class="card">
    <div class="type-tabs" id="typeTabs">
      <button class="type-tab active" data-value="Выходной" onclick="selectType(this)">😴<br>Выходной</button>
      <button class="type-tab" data-value="Больничный" onclick="selectType(this)">🤒<br>Больничный</button>
      <button class="type-tab" data-value="ТС в Ремонте" onclick="selectType(this)">🔧<br>ТС в ремонте</button>
    </div>
  </div>

  <!-- Дни -->
  <div class="card">
    <div class="days-section">
      <div class="days-header">
        <span class="days-title">Дни месяца</span>
        <span class="days-count" id="daysCount"></span>
      </div>
      <div class="days-grid" id="daysGrid"></div>
      <button class="select-all-btn" id="selectAllBtn" onclick="toggleSelectAll()">Выбрать все дни</button>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submit()">
    ✅ Добавить в Notion
  </button>
</div>

<!-- Экран успеха -->
<div id="successScreen">
  <div class="success-circle">✓</div>
  <div class="success-title">Добавлено!</div>
  <div class="success-info" id="successInfo"></div>
  <button class="submit-btn" onclick="reset()" style="max-width: 280px; margin: 0 auto; display: block;">
    ＋ Добавить ещё
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.ready(); }

  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                  'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

  let selectedType = 'Выходной';
  let selectedDays = new Set();

  // Установить текущий месяц по умолчанию
  const currentMonth = MONTHS[new Date().getMonth()];
  document.getElementById('month').value = currentMonth;

  // Загрузить список водителей
  fetch('/api/employees')
    .then(r => r.json())
    .then(({ employees }) => {
      const sel = document.getElementById('employee');
      if (!employees?.length) {
        sel.innerHTML = '<option>Ошибка загрузки</option>';
        return;
      }
      sel.innerHTML = employees.map(e =>
        `<option value="${e}">${e}</option>`
      ).join('');
    })
    .catch(() => {
      document.getElementById('employee').innerHTML = '<option>Ошибка соединения</option>';
    });

  // Построить сетку дней
  function buildDaysGrid() {
    const month = document.getElementById('month').value;
    const monthIdx = MONTHS.indexOf(month);
    const year = new Date().getFullYear();
    const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();

    selectedDays.clear();
    updateDaysCount();

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';
    for (let d = 1; d <= daysInMonth; d++) {
      const btn = document.createElement('button');
      btn.className = 'day-btn';
      btn.textContent = d;
      btn.addEventListener('click', () => toggleDay(d, btn));
      grid.appendChild(btn);
    }
    document.getElementById('selectAllBtn').textContent = 'Выбрать все дни';
  }

  function onMonthChange() { buildDaysGrid(); }

  function toggleDay(day, btn) {
    if (selectedDays.has(day)) {
      selectedDays.delete(day);
      btn.classList.remove('selected');
    } else {
      selectedDays.add(day);
      btn.classList.add('selected');
    }
    updateDaysCount();
    if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
  }

  function toggleSelectAll() {
    const btns = document.querySelectorAll('.day-btn');
    const allSelected = selectedDays.size === btns.length;
    selectedDays.clear();
    btns.forEach(btn => {
      if (!allSelected) {
        selectedDays.add(parseInt(btn.textContent));
        btn.classList.add('selected');
      } else {
        btn.classList.remove('selected');
      }
    });
    document.getElementById('selectAllBtn').textContent =
      allSelected ? 'Выбрать все дни' : 'Снять выделение';
    updateDaysCount();
  }

  function updateDaysCount() {
    const el = document.getElementById('daysCount');
    el.textContent = selectedDays.size > 0
      ? `выбрано ${selectedDays.size} дн.`
      : '';
  }

  function selectType(btn) {
    document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.value;
    if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  async function submit() {
    const employee = document.getElementById('employee').value;
    const month    = document.getElementById('month').value;

    if (!employee || employee.includes('Загрузка') || employee.includes('Ошибка')) {
      showToast('⚠️ Выберите водителя'); return;
    }
    if (selectedDays.size === 0) {
      showToast('⚠️ Выберите хотя бы один день'); return;
    }

    const days = Array.from(selectedDays).sort((a, b) => a - b).join(', ');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Сохраняем…';

    try {
      const res = await fetch('/api/vacation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ employee, month, type: selectedType, days }),
      });
      const data = await res.json();

      if (data.success) {
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        document.getElementById('app').style.display = 'none';
        const sc = document.getElementById('successScreen');
        sc.style.display = 'block';
        document.getElementById('successInfo').innerHTML =
          `<strong>${employee}</strong><br>${month} · ${selectedType}<br>Дни: ${days}`;
      } else {
        showToast('❌ ' + (data.error || 'Ошибка Notion'));
        btn.disabled = false;
        btn.textContent = '✅ Добавить в Notion';
      }
    } catch {
      showToast('❌ Нет соединения');
      btn.disabled = false;
      btn.textContent = '✅ Добавить в Notion';
    }
  }

  function reset() {
    document.getElementById('successScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = '✅ Добавить в Notion';
    buildDaysGrid();
  }

  // Инит
  buildDaysGrid();
</script>
</body>
</html>
